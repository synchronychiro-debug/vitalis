services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vitalis
      POSTGRES_PASSWORD: vitalis_dev
      POSTGRES_DB: vitalis_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitalis -d vitalis_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://vitalis:vitalis_dev@postgres:5432/vitalis_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-me
      NODE_ENV: development
      PORT: "3000"
      HOST: "0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages

volumes:
  postgres_data:
  redis_data:
