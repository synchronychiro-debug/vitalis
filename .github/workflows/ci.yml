name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vitalis
          POSTGRES_PASSWORD: vitalis_test
          POSTGRES_DB: vitalis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vitalis -d vitalis_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://vitalis:vitalis_test@localhost:5432/vitalis_test
      JWT_SECRET: test-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=apps/api/prisma/schema.prisma

      - name: Deploy database migrations
        run: npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma

      - name: Verify no pending schema drift
        run: npx prisma migrate diff --schema=apps/api/prisma/schema.prisma --from-migrations apps/api/prisma/migrations --to-schema-datamodel apps/api/prisma/schema.prisma --exit-code

      - name: Build packages
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test
